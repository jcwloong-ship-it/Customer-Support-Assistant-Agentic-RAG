[pytest]
testpaths   = tests
python_files  = test_*.py
python_classes = Test*
python_functions = test_*

# Clean, concise output
addopts =
    -v
    --tb=short
    --no-header
    -q

# Treat all warnings as non-fatal (some Google API stubs emit DeprecationWarnings)
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
